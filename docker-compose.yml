services:
  assistant-agent:
    build: .
    env_file: .env
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    network_mode: host

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Uncomment for GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  ollama_data:
